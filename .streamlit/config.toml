[server]
headless = true
enableCORS = true
enableXsrfProtection = true

[client]
toolbarMode = "minimal"
showErrorDetails = "none"
showErrorLinks = false
showSidebarNavigation = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#E5484D"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#FAFAFA"
font = "sans serif"
baseFontSize = 16
